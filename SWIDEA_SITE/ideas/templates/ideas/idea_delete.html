{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Idea Delete</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
      background-image: url("{% static 'ideas/bg.jpg' %}");
      background-color: #2b2f36;
      background-size: cover;
      background-attachment: fixed;
      background-position: center;
      color: #e6e9ef;
      min-height: 100vh;
    }
    .navbar {
      display: flex;
      align-items: center;
      gap: 40px;
      padding: 16px 40px;
      background: #14161a;
    }
    .navbar .brand {
      font-weight: 700;
      font-size: 17px;
      margin-right: auto;
      color: #dfe3ea;
    }
    .navbar .brand b { color: #4da3ff; }
    .navbar a {
      color: #c3c9d6;
      text-decoration: none;
      font-size: 14px;
    }
    .navbar a:hover { color: #fff; }

    .container {
      max-width: 480px;
      margin: 30px auto;
      padding: 30px 30px 40px;
      background: rgba(60, 65, 74, 0.55);
      border-radius: 4px;
      text-align: center;
    }
    .page-head h1 {
      font-size: 24px;
      color: #ffd23f;
      letter-spacing: 1px;
      margin-bottom: 14px;
    }
    .page-head p {
      color: #c7ccd6;
      font-size: 14px;
      margin-bottom: 28px;
    }
    .page-head p b { color: #fff; }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 12px;
    }
    .btn {
      padding: 8px 22px;
      font-size: 14px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
      color: #fff;
    }
    .btn-delete { background: #d9534f; }
    .btn-list   { background: #6c757d; }
    .btn:hover { opacity: 0.9; }
  </style>
</head>
<body>

  <nav class="navbar">
    <span class="brand">My <b>SW Idea</b> Manage</span>
    <a href="{% url 'idea-create' %}">아이디어 등록</a>
    <a href="{% url 'idea-list' %}">아이디어 관리</a>
    <a href="{% url 'devtool-create' %}">개발툴 등록</a>
    <a href="{% url 'devtool-list' %}">개발툴 관리</a>
  </nav>

  <div class="container">
    <div class="page-head">
      <h1>아이디어 삭제</h1>
      <p><b>{{ idea.title }}</b>을(를) 정말 삭제하시겠습니까?</p>
    </div>

    <div class="buttons">
      <form action="{% url 'idea-delete' idea.pk %}" method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-delete">삭제</button>
      </form>
      <a href="{% url 'idea-detail' idea.pk %}" class="btn btn-list">취소</a>
    </div>
  </div>

</body>
</html>
